name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: ファイル検出してindex.htmlを生成
        run: |
          FILES=($(ls *_LINE_theme_editor.html | sort))
          COUNT=${#FILES[@]}
          LATEST="${FILES[$COUNT-1]}"
          LATEST_DATE=$(echo "$LATEST" | grep -oP '^\d{4}-\d{2}-\d{2}-\w{3}_\d{2}h-\d{2}m-\d{2}\.\d{2}s')

          if [ $COUNT -ge 2 ]; then
            STABLE="${FILES[$COUNT-2]}"
            STABLE_DATE=$(echo "$STABLE" | grep -oP '^\d{4}-\d{2}-\d{2}-\w{3}_\d{2}h-\d{2}m-\d{2}\.\d{2}s')
            RELEASE_BUTTON="<a class=\"release\" href=\"./$STABLE\">✅ リリース版<br><small>$STABLE_DATE</small></a>"
          else
            RELEASE_BUTTON=""
          fi

          cat > index.html << EOF
          <!DOCTYPE html>
          <html lang="ja">
          <head>
            <meta charset="UTF-8">
            <title>LINE Theme Editor</title>
            <style>
              body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; background: #f5f5f5; }
              h1 { margin-bottom: 2rem; }
              .buttons { display: flex; gap: 2rem; }
              a { padding: 1rem 2rem; border-radius: 8px; text-decoration: none; font-size: 1.1rem; font-weight: bold; text-align: center; }
              .release { background: #06C755; color: white; }
              .prerelease { background: #555; color: white; }
              small { font-size: 0.7rem; font-weight: normal; }
            </style>
          </head>
          <body>
            <h1>LINE Theme Editor</h1>
            <div class="buttons">
              $RELEASE_BUTTON
              <a class="prerelease" href="./$LATEST">🧪 プレリリース版<br><small>$LATEST_DATE</small></a>
            </div>
          </body>
          </html>
          EOF

      - uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - uses: actions/deploy-pages@v4
