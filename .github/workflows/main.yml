name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: 最新のHTMLファイルを検出してindex.htmlを生成
        run: |
          FILE=$(ls *_LINE_theme_editor.html | sort | tail -n 1)
          echo "対象ファイル: $FILE"
          cat > index.html << EOF
          <!DOCTYPE html>
          <html>
          <head>
            <meta http-equiv="refresh" content="0; url=./$FILE">
          </head>
          <body></body>
          </html>
          EOF

      - name: Pages用にアップロード
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: GitHub Pagesにデプロイ
        uses: actions/deploy-pages@v4
